<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THYNK UNLIMITED | Secure Login</title>
    <style>
        /* ===== RESET & GLOBAL STYLES ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            background: #0B1C2D;  /* your navy */
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* ===== ANIMATED RINGS ===== */
        .ring {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            top: 0;
            left: 0;
            pointer-events: none;  /* so clicks pass through to the form */
            z-index: 1;
        }

        .ring i {
            position: absolute;
            width: 400px;
            height: 400px;
            border: 2px solid transparent;
            border-radius: 50%;
            animation: rotate 8s linear infinite, glowColors 6s infinite alternate;
            box-shadow: 0 0 20px currentColor;
        }

        .ring i:nth-child(1) {
            width: 350px;
            height: 350px;
            animation-delay: -2s;
            filter: blur(2px);
        }

        .ring i:nth-child(2) {
            width: 450px;
            height: 450px;
            animation-delay: -4s;
            filter: blur(4px);
        }

        .ring i:nth-child(3) {
            width: 550px;
            height: 550px;
            animation-delay: -6s;
            filter: blur(6px);
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes glowColors {
            0% { border-color: #ff8c00; box-shadow: 0 0 30px #ff8c00; }      /* orange */
            25% { border-color: #94A3B8; box-shadow: 0 0 30px #94A3B8; }    /* grey */
            50% { border-color: #ff4d4d; box-shadow: 0 0 30px #ff4d4d; }    /* red */
            75% { border-color: #00BFFF; box-shadow: 0 0 30px #00BFFF; }    /* electric */
            100% { border-color: #C6A85C; box-shadow: 0 0 30px #C6A85C; }   /* gold */
        }

        /* ===== LOGIN FORM ===== */
        .login {
            position: relative;
            z-index: 10;
            width: 380px;
            padding: 40px 30px;
            background: rgba(31, 46, 61, 0.25); /* slate with transparency */
            backdrop-filter: blur(12px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            text-align: center;
            color: #F5F7FA;
            transition: 0.3s;
        }

        .login:hover {
            border-color: rgba(0, 191, 255, 0.5);
            box-shadow: 0 0 30px rgba(0, 191, 255, 0.3);
        }

        .login h2 {
            font-size: 2rem;
            margin-bottom: 30px;
            color: #C6A85C; /* gold */
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(198, 168, 92, 0.5);
        }

        .inputBx {
            margin-bottom: 25px;
            width: 100%;
        }

        .inputBx input {
            width: 100%;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            font-size: 1rem;
            color: #F5F7FA;
            outline: none;
            transition: 0.3s;
        }

        .inputBx input:focus {
            border-color: #00BFFF;
            background: rgba(0, 191, 255, 0.1);
            box-shadow: 0 0 15px rgba(0, 191, 255, 0.4);
        }

        .inputBx input::placeholder {
            color: rgba(255, 255, 255, 0.5);
            font-weight: 300;
        }

        .inputBx input[type="submit"] {
            background: #00BFFF;
            border: none;
            color: #0B1C2D;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 0 20px rgba(0, 191, 255, 0.5);
            transition: 0.3s;
        }

        .inputBx input[type="submit"]:hover {
            background: #C6A85C;
            box-shadow: 0 0 30px #C6A85C;
            color: #0B1C2D;
        }

        /* ===== LINKS (Forgot / Signup) ===== */
        .links {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            font-size: 0.9rem;
        }

        .links a {
            color: #94A3B8;
            text-decoration: none;
            transition: 0.3s;
            position: relative;
        }

        .links a:hover {
            color: #00BFFF;
            text-shadow: 0 0 8px #00BFFF;
        }

        .links a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0%;
            height: 1px;
            background: #00BFFF;
            transition: 0.3s;
        }

        .links a:hover::after {
            width: 100%;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 480px) {
            .login {
                width: 90%;
                padding: 30px 20px;
            }
            .ring i {
                width: 250px;
                height: 250px;
            }
            .ring i:nth-child(2) {
                width: 350px;
                height: 350px;
            }
            .ring i:nth-child(3) {
                width: 450px;
                height: 450px;
            }
        }
    </style>
</head>
<body>
    <!-- Animated glowing rings -->
    <div class="ring">
        <i></i>
        <i></i>
        <i></i>
    </div>

    <!-- Login form -->
    <div class="login">
        <h2>Login</h2>
        <div class="inputBx">
            <input type="text" placeholder="Username">
        </div>
        <div class="inputBx">
            <input type="password" placeholder="Password">
        </div>
        <div class="inputBx">
            <input type="submit" value="Sign In">
        </div>
        <div class="links">
            <a href="#">Forgot Password</a>
            <a href="#">Signup</a>
        </div>
    </div>
</body>
</html>
